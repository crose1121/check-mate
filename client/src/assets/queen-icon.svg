      <stop offset="0%" stop-color="#ffe08a"/>
      <stop offset="45%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#b8890b"/>
    </linearGradient>
    <linearGradient id="queenShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#facc15" stop-opacity="0.9"/>
