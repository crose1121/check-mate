services:
  db:
    image: postgres:15
    container_name: checkmate-db
    environment:
      POSTGRES_USER: checkmate
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: checkmate
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./sql:/sql

  pgadmin:
    image: dpage/pgadmin4
    container_name: checkmate-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  server:
    build: ./server
    environment:
      DATABASE_URL: postgresql://checkmate:secret@db:5432/checkmate
      JWT_SECRET: changeme
      PORT: 4000
    depends_on:
      - db
    ports:
      - "4000:4000"

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://${PUBLIC_HOST:-localhost}:4000
    depends_on:
      - server
    ports:
      - "80:80" # changed from 3000:80

volumes:
  db-data:
  pgadmin-data:
